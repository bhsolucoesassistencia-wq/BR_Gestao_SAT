{% extends "base.html" %}{% block content %}<h2>Usuários</h2><form method="post" class="card form"><div><label>Nome</label><input name="nome" required></div><div><label>E-mail</label><input type="email" name="email" required></div><div><label>Senha</label><input type="password" name="senha" required></div><div><label>Perfil</label><select name="perfil"><option>Administrador</option><option>Equipe</option></select></div><div><button class="btn">Cadastrar usuário</button></div></form><div class="card"><table><tr><th>Nome</th><th>E-mail</th><th>Perfil</th></tr>{% for r in rows %}<tr><td>{{ r.nome }}</td><td>{{ r.email }}</td><td>{{ r.perfil }}</td></tr>{% endfor %}</table></div>{% endblock %}
