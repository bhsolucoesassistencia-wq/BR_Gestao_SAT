{% extends "base.html" %}{% block content %}<h2>Base de garantias</h2><form class="card form"><div><label>Empreendimento</label><select name="empreendimento"><option value="">Todos</option>{% for e in ['Vittace Serena','Vittace Reserva','Vittace Boulevard'] %}<option {% if request.args.get('empreendimento')==e %}selected{% endif %}>{{ e }}</option>{% endfor %}</select></div><div><label>Buscar item</label><input name="q" value="{{ request.args.get('q','') }}"></div><div><button class="btn">Filtrar</button></div></form><div class="card tablewrap"><table><tr><th>Empreendimento</th><th>Item</th><th>Prazo</th><th>Classificação-base</th><th>Descrição</th><th>Fonte</th></tr>{% for r in rows %}<tr><td>{{ r.empreendimento }}</td><td><b>{{ r.item }}</b></td><td>{{ r.prazo_meses }} meses</td><td>{{ r.classificacao_padrao }}</td><td>{{ r.descricao }}</td><td>{{ r.fonte }}</td></tr>{% endfor %}</table></div>{% endblock %}
