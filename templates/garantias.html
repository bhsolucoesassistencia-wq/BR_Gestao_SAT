{% extends "base.html" %}{% block content %}<h2>Base de garantias</h2><form class="card form" method="get"><div><label>Empreendimento</label><select name="empreendimento"><option value="">Todos</option><option>Vittace Serena</option><option>Vittace Reserva</option><option>Vittace Boulevard</option></select></div><div><label>Pesquisar item</label><input name="q" value="{{ request.args.get('q','') }}"></div><button class="btn">Pesquisar</button></form><div class="card tablewrap"><table><tr><th>Empreendimento</th><th>Item</th><th>Prazo</th><th>Regra</th><th>Fonte</th></tr>{% for r in rows %}<tr><td>{{ r.empreendimento }}</td><td><b>{{ r.item }}</b></td><td>{{ r.prazo_meses }} meses</td><td>{{ r.descricao }}</td><td>{{ r.fonte }}</td></tr>{% endfor %}</table></div>{% endblock %}
