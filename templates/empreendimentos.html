{% extends "base.html" %}{% block content %}<h2>Empreendimentos</h2><form method="post" class="card form"><div><label>Nome</label><input name="nome" required></div><div><label>Data de entrega</label><input type="date" name="data_entrega"></div><div class="full"><label>Observações</label><input name="observacoes"></div><div><button class="btn">Cadastrar</button></div></form><div class="card"><table><tr><th>Nome</th><th>Data de entrega</th><th>Observações</th></tr>{% for r in rows %}<tr><td>{{ r.nome }}</td><td>{{ r.data_entrega }}</td><td>{{ r.observacoes }}</td></tr>{% endfor %}</table></div>{% endblock %}
