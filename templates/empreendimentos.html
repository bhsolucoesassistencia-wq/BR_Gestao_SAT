{% extends "base.html" %}{% block content %}<h2>Empreendimentos</h2><form method="post" class="card form"><div><label>Nome</label><input name="nome" required></div><div><label>Construtora</label><select name="construtora">{% for c in construtoras %}<option>{{ c.nome }}</option>{% endfor %}</select><label>Data de entrega</label><input type="date" name="data_entrega"></div><div class="full"><label>Observações</label><textarea name="observacoes"></textarea></div><button class="btn">Adicionar</button></form><div class="card tablewrap"><table><tr><th>Nome</th><th>Entrega</th><th>Observações</th></tr>{% for r in rows %}<tr><td>{{ r.nome }}</td><td>{{ r.construtora or "Prestes" }}</td><td>{{ r.data_entrega }}</td><td>{{ r.observacoes }}</td></tr>{% endfor %}</table></div>{% endblock %}
