{% extends "base.html" %}{% block content %}<div class="actions" style="justify-content:space-between"><h2>Editar lançamento financeiro</h2><a class="btn btn2" href="{{ url_for('financeiro') }}">Voltar</a></div><form method="post" class="card form"><div><label>Data</label><input type="date" name="data" value="{{ r.data }}"></div><div><label>Tipo</label><select name="tipo">{% for x in ['Entrada','Saída'] %}<option {% if r.tipo==x %}selected{% endif %}>{{ x }}</option>{% endfor %}</select></div><div class="full"><label>Descrição</label><input name="descricao" value="{{ r.descricao or '' }}" required></div><div><label>Empreendimento</label><select name="empreendimento">{% for e in emps %}<option {% if r.empreendimento==e.nome %}selected{% endif %}>{{ e.nome }}</option>{% endfor %}</select></div><div><label>Categoria</label><input name="categoria" value="{{ r.categoria or '' }}"></div><div><label>Valor</label><input type="number" step="0.01" name="valor" value="{{ r.valor }}" required></div><div><label>Status</label><select name="status">{% for x in ['Pago/Recebido','Pendente'] %}<option {% if r.status==x %}selected{% endif %}>{{ x }}</option>{% endfor %}</select></div><div><label>Forma de pagamento</label><select name="forma_pagamento">{% for x in ['PIX','Dinheiro','Transferência','Boleto','Cartão'] %}<option {% if r.forma_pagamento==x %}selected{% endif %}>{{ x }}</option>{% endfor %}</select></div><div class="full"><button class="btn">Salvar alterações</button></div></form>{% endblock %}
