{% extends "base.html" %}{% block content %}<h2>Novo chamado</h2><form method="post" class="card form">
<div><label>Número SAT</label><input name="sat" required></div><div><label>Empreendimento</label><select name="empreendimento" required>{% for e in emps %}<option>{{ e.nome }}</option>{% endfor %}</select></div>
<div><label>Data recebida</label><input type="date" name="data_recebido" value="{{ now.strftime('%Y-%m-%d') }}"></div><div><label>Data de entrega da unidade/obra</label><input type="date" name="data_entrega"></div>
<div><label>Solicitante</label><input name="solicitante"></div><div><label>Bloco/Apartamento</label><input name="unidade"></div><div><label>Contato</label><input name="contato"></div><div><label>Responsável</label><input name="responsavel"></div>
<div><label>Categoria de garantia</label><select name="categoria"><option value="">Detectar automaticamente</option>{% for c in cats %}<option>{{ c.item }}</option>{% endfor %}</select></div><div><label>Status</label><select name="status"><option>Aberto</option><option>Vistoria agendada</option><option>Vistoria realizada</option><option>Em execução</option><option>Aguardando material</option><option>Finalizado</option></select></div>
<div class="full"><label>Problema relatado</label><textarea name="problema" required></textarea></div><div class="full"><label>Observações</label><textarea name="observacoes"></textarea></div><div><button class="btn">Salvar e analisar garantia</button></div></form>{% endblock %}
