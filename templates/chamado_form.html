{% extends "base.html" %}{% block content %}<h2>Novo chamado</h2><form method="post" class="card form"><div><label>Número da SAT</label><input name="sat"></div><div><label>Empreendimento</label><select name="empreendimento" required>{% for e in emps %}<option>{{ e.nome }}</option>{% endfor %}</select></div><div><label>Data de abertura</label><input type="date" name="data_recebido" value="{{ now.date() }}"></div><div><label>Data de entrega</label><input type="date" name="data_entrega"></div><div><label>Solicitante/Morador</label><input name="solicitante"></div><div><label>Unidade/Torre</label><input name="unidade"></div><div><label>Contato</label><input name="contato"></div><div><label>Status</label><select name="status"><option>Aberto</option><option>Em andamento</option><option>Aguardando material</option><option>Agendado</option><option>Finalizado</option></select></div><div class="full"><label>Problema relatado</label><textarea name="problema" required></textarea></div><div class="full"><label>Categoria de garantia</label><select name="categoria"><option value="">Analisar automaticamente</option>{% for c in cats %}<option>{{ c }}</option>{% endfor %}</select></div><div><label>Responsável</label><input name="responsavel"></div><div><label>Classificação inicial</label><select name="classificacao"><option value="">Automática</option><option>Procedente</option><option>Improcedente</option><option>Necessita vistoria</option></select></div><div class="full"><label>Observações</label><textarea name="observacoes"></textarea></div><div class="full"><button class="btn">Salvar chamado</button></div></form>{% endblock %}
