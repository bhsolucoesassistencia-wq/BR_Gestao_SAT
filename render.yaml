services:
  - type: web
    name: br-gestao-sat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: br-gestao-db
          property: connectionString
databases:
  - name: br-gestao-db
    databaseName: brgestao
    user: brgestao
